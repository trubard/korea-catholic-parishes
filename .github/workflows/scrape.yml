name: Scrape church directory

on:
  schedule:
    # 매일 20:00 UTC = 익일 05:00 KST 에 실행
    - cron: "0 20 * * *"
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 버튼

# data/ 커밋 푸시를 위해 쓰기 권한 필요
permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          VWORLD_KEY: ${{ secrets.VWORLD_KEY }}
          VWORLD_REFERER: ${{ secrets.VWORLD_REFERER }}
        run: python scraper/scrape.py --workers 6

      - name: Commit & push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "변경 사항 없음 — 커밋 생략"
          else
            git commit -m "data: update $(date -u +'%Y-%m-%d')"
            git push
          fi
